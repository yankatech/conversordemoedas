<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Moedas</title>
    <link rel="stylesheet" href="styleconversor.css">
</head>
<body>

    <div class="container">
        <div class="card">
            <h1 id="titulo">Conversor de Moedas</h1>
            
            <label for="valor">Valor em R$ (Real):</label>
            <input type="number" id="valor" placeholder="Ex: 100.00" min="0" step="0.01">

            <label for="moeda-destino">Converter para:</label>
            <select id="moeda-destino">
                <option value="USD">Dólar Americano (USD)</option>
                <option value="EUR">Euro (EUR)</option>
                <option value="GBP">Libra Esterlina (GBP)</option>
                <option value="BTC">Bitcoin (BTC)</option>
            </select>

            <button id="btn-converter">Converter</button>

            <div id="resultado">Digite um valor e converta!</div>
        </div>
    </div>

    <script src="scriptconversor.js"></script>
</body>
</html>
